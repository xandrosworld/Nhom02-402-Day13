# Owner: Pham Le Hoang Nam
alerts:
  - name: high_latency_p95
    severity: P2
    condition: latency_p95_ms > 5000 for 30m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#1-high-latency-p95
  - name: high_error_rate
    severity: P1
    condition: error_rate_pct > 5 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#2-high-error-rate
  - name: cost_budget_spike
    severity: P2
    condition: hourly_cost_usd > 0.5 for 15m
    type: symptom-based
    owner: finops-owner
    runbook: docs/alerts.md#3-cost-budget-spike
  - name: quality_score_drop
    severity: P3
    condition: quality_score_avg < 0.75 for 1h
    type: symptom-based
    owner: ai-quality-team
    runbook: docs/alerts.md#4-quality-score-drop
  - name: traffic_spike_detected
    severity: P3
    condition: requests_per_min > 500 for 5m
    type: symptom-based
    owner: platform-eng
    runbook: docs/alerts.md#5-traffic-spike-detected
  - name: pii_redaction_anomaly
    severity: P2
    condition: pii_redact_rate > 20 for 10m
    type: symptom-based
    owner: security-team
    runbook: docs/alerts.md#6-pii-redaction-anomaly
